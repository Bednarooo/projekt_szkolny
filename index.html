<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projekt szkolny</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="Projekt szkolny">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <meta name="theme-color" content="#fafafa">

</head>

<body>
  <div id="mobile-warning" class="mobile-warning">
    <img src="img/angry_pengu.jpg" class="pengu" alt="angry pengu">
    <h1 class="mobile-title">Klaudia...</h1>
    <p class="mobile-subtitle">Przecież napisałem, że na kompie 💻</p>
  </div>

  <div class="main">
    <div id="card">
      <h1 class="title">Pójdziesz ze mną na randkę?</h1>

      <div class="buttons">
        <button class="neon-btn" >Tak ❤️</button>
        <button id="noBtn" class="btn no">Nie</button>
      </div>
    </div>
    <div id="sad_rat_div">
      <img class ="sad_rat_img" src="img/sad_rat.gif" alt="sad_rat">
    </div>
  </div>

  <div id="yes-screen" class="yes-screen">
    <h1>TAK!!! ❤️</h1>
    <p>Chodźmy na randkę 😄</p>
    <p class="line l3">Co chcesz robić?</p>

    <div class="choices">
      <div class="choice">
        <img src="img/movie.jpg" />
        <p>Film 🎬</p>
      </div>

      <div class="choice">
        <img src="img/walk.jpg" />
        <p>Spacer 🌙</p>
      </div>

      <div class="choice">
        <img src="img/food.jpg" />
        <p>Jedzenie 🍕</p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
